name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install root deps
        run: npm ci
      - name: Build frontend
        run: |
          cd apps/frontend
          npm ci
          npm run build
      - name: Build backend
        run: |
          cd apps/backend
          npm ci
          npm run build
